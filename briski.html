document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\/span>&nbsp;&nbsp;EENVOUDIG TE VERVOEREN&nbsp;&nbsp;<span style=\"color:#A8D426;\">\u2726<\/span>&nbsp;&nbsp;MAX 25 KM/U&nbsp;&nbsp;<span style=\"color:#A8D426;\">\u2726<\/span>&nbsp;&nbsp;<\/span>\n      <span style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 600; font-size: clamp(20px,2.4vw,30px); color: #F5F3EC; letter-spacing: -0.01em;\">ZEER WENDBAAR&nbsp;&nbsp;<span style=\"color:#A8D426;\">\u2726<\/span>&nbsp;&nbsp;UITERST STABIEL&nbsp;&nbsp;<span style=\"color:#A8D426;\">\u2726<\/span>&nbsp;&nbsp;MILIEUBEWUST&nbsp;&nbsp;<span style=\"color:#A8D426;\">\u2726<\/span>&nbsp;&nbsp;EENVOUDIG TE VERVOEREN&nbsp;&nbsp;<span style=\"color:#A8D426;\">\u2726<\/span>&nbsp;&nbsp;MAX 25 KM/U&nbsp;&nbsp;<span style=\"color:#A8D426;\">\u2726<\/span>&nbsp;&nbsp;<\/span>\n    <\/div>\n  <\/div>\n\n  <!-- VOORDELEN -->\n  <section id=\"voordelen\" style=\"max-width: 1440px; margin: 0 auto; padding: clamp(80px,12vh,150px) clamp(20px,5vw,64px);\">\n    <div style=\"display: flex; align-items: flex-end; justify-content: space-between; gap: 32px; flex-wrap: wrap; margin-bottom: 64px;\">\n      <div>\n        <span style=\"font-size: 13px; letter-spacing: 0.14em; color: #5B7A0E; font-weight: 700; text-transform: uppercase;\">&#9135;&#8196; Waarom BRISKI<\/span>\n        <h2 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 700; font-size: clamp(36px,5.5vw,72px); line-height: 1.0; letter-spacing: -0.03em; margin: 18px 0 0; max-width: 15ch;\">Waarom de BRISKI?<\/h2>\n      <\/div>\n      <p style=\"color: #6B6D5F; font-size: 16px; line-height: 1.6; max-width: 34ch;\">Compact, licht en volledig elektrisch. Ontdek waarom de BRISKI bij jou past.<\/p>\n    <\/div>\n\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px;\">\n      <div style=\"border: 1px solid rgba(23,25,15,0.08); border-radius: 24px; padding: 36px; background: rgba(251,250,244,0.8); backdrop-filter: blur(8px); transition: all 0.3s ease;\" style-hover=\"transform: translateY(-4px); box-shadow: 0 16px 40px rgba(23,25,15,0.06); border-color: rgba(168,212,38,0.25);\">\n        <div style=\"width: 46px; height: 46px; border-radius: 12px; background: rgba(168,212,38,0.2); display: flex; align-items: center; justify-content: center; margin-bottom: 22px;\"><span style=\"width: 18px; height: 18px; border: 2.5px solid #5B7A0E; border-radius: 50% 50% 50% 0; transform: rotate(-45deg);\"><\/span><\/div>\n        <h3 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 600; font-size: 23px; margin: 0 0 10px; letter-spacing: -0.02em;\">Zeer wendbaar<\/h3>\n        <p style=\"color: #6B6D5F; font-size: 15px; line-height: 1.6; margin: 0;\">Rijdt moeiteloos door drukke straten, smalle paden en krappe bochten.<\/p>\n      <\/div>\n      <div style=\"border: 1px solid rgba(23,25,15,0.08); border-radius: 24px; padding: 36px; background: rgba(251,250,244,0.8); backdrop-filter: blur(8px); transition: all 0.3s ease;\">\n        <div style=\"width: 46px; height: 46px; border-radius: 12px; background: rgba(168,212,38,0.2); display: flex; align-items: center; justify-content: center; margin-bottom: 22px;\"><span style=\"width: 20px; height: 20px; border: 2.5px solid #5B7A0E; border-radius: 50%; border-right-color: transparent; transform: rotate(45deg);\"><\/span><\/div>\n        <h3 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 600; font-size: 23px; margin: 0 0 10px; letter-spacing: -0.02em;\">Uiterst stabiel<\/h3>\n        <p style=\"color: #6B6D5F; font-size: 15px; line-height: 1.6; margin: 0;\">Drie wielen geven vertrouwen: stilstaan en wegrijden zonder balanceren.<\/p>\n      <\/div>\n      <div style=\"border: 1px solid rgba(23,25,15,0.08); border-radius: 24px; padding: 36px; background: rgba(251,250,244,0.8); backdrop-filter: blur(8px); transition: all 0.3s ease;\">\n        <div style=\"width: 46px; height: 46px; border-radius: 12px; background: rgba(168,212,38,0.2); display: flex; align-items: center; justify-content: center; margin-bottom: 22px;\"><span style=\"width: 18px; height: 18px; border: 2.5px solid #5B7A0E; border-radius: 4px;\"><\/span><\/div>\n        <h3 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 600; font-size: 23px; margin: 0 0 10px; letter-spacing: -0.02em;\">Geen parkeerprobleem<\/h3>\n        <p style=\"color: #6B6D5F; font-size: 15px; line-height: 1.6; margin: 0;\">Zo compact dat je overal een plek vindt. Zet 'm neer waar een fiets past.<\/p>\n      <\/div>\n      <div style=\"border: 1.5px solid rgba(168,212,38,0.25); border-radius: 24px; padding: 36px; background: linear-gradient(135deg, #17190F, #1E2014); position: relative; overflow: hidden;\">\n        <div style=\"width: 46px; height: 46px; border-radius: 12px; background: rgba(168,212,38,0.25); display: flex; align-items: center; justify-content: center; margin-bottom: 22px;\"><span style=\"color: #A8D426; font-size: 22px; line-height: 1;\">\u2726<\/span><\/div>\n        <h3 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 600; font-size: 23px; margin: 0 0 10px; letter-spacing: -0.02em; color: #A8D426;\">Zelf in te stellen<\/h3>\n        <p style=\"color: #C7C9BB; font-size: 15px; line-height: 1.6; margin: 0;\">Max. 25 km/u, zelf instelbaar via de draaibare begrenzer aan het stuur.<\/p>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- MODEL / SHOWCASE -->\n  <section id=\"model\" style=\"background: linear-gradient(180deg, #ECEAE0, #E4E2D6); border-top: 1px solid rgba(23,25,15,0.04);\">\n    <div style=\"max-width: 1400px; margin: 0 auto; padding: clamp(72px,10vh,130px) clamp(20px,5vw,64px); display: grid; grid-template-columns: repeat(auto-fit, minmax(300px,1fr)); gap: clamp(32px,5vw,72px); align-items: center;\">\n      <div>\n        <span style=\"font-size: 13px; letter-spacing: 0.14em; color: #5B7A0E; font-weight: 700; text-transform: uppercase;\">&#9135;&#8196; Het model<\/span>\n        <h2 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 700; font-size: clamp(34px,4.6vw,60px); line-height: 1.0; letter-spacing: -0.03em; margin: 14px 0 22px;\">Klein van formaat.<br>Groot in beleving.<\/h2>\n        <p style=\"color: #55574A; font-size: 17px; line-height: 1.6; margin: 0 0 28px; max-width: 46ch;\">Elk detail is ontworpen rond lichtheid en gemak. Van het frame tot de optionele Li-ion accu die het gewicht terugbrengt naar slechts 33 kg.<\/p>\n        <ul style=\"list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 14px;\">\n          <li style=\"display: flex; align-items: center; gap: 12px; color: #2A2C20; font-size: 16px;\"><span style=\"color: #5B7A0E;\">\u2192<\/span> Licht frame, eenvoudig te vervoeren<\/li>\n          <li style=\"display: flex; align-items: center; gap: 12px; color: #2A2C20; font-size: 16px;\"><span style=\"color: #5B7A0E;\">\u2192<\/span> Keuze uit standaard of lichte Li-ion accu<\/li>\n          <li style=\"display: flex; align-items: center; gap: 12px; color: #2A2C20; font-size: 16px;\"><span style=\"color: #5B7A0E;\">\u2192<\/span> Optioneel met zadel en rugleuning<\/li>\n          <li style=\"display: flex; align-items: center; gap: 12px; color: #2A2C20; font-size: 16px;\"><span style=\"color: #5B7A0E;\">\u2192<\/span> Verkrijgbaar in rood, oranje en groen<\/li>\n        <\/ul>\n      <\/div>\n      \n    <\/div>\n  <\/section>\n\n  <!-- 3D VIEWER -->\n  <section id=\"briski3d\" style=\"background: #E4E2D6; border-top: 1px solid rgba(23,25,15,0.04);\">\n    <div style=\"max-width: 1400px; margin: 0 auto; padding: clamp(72px,10vh,130px) clamp(20px,5vw,64px);\">\n      <div style=\"text-align: center; max-width: 720px; margin: 0 auto 40px;\">\n        <span style=\"font-size: 13px; letter-spacing: 0.14em; color: #5B7A0E; font-weight: 700; text-transform: uppercase;\">&#9135;&#8196; Bekijk hem in 3D<\/span>\n        <h2 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 700; font-size: clamp(34px,4.6vw,60px); line-height: 1.05; letter-spacing: -0.03em; margin: 14px 0 18px;\">Draai de BRISKI zelf rond.<\/h2>\n        <p style=\"color: #55574A; font-size: 17px; line-height: 1.6; margin: 0;\">Sleep met je muis of vinger om de step van alle kanten te bekijken. Scroll of knijp om in en uit te zoomen.<\/p>\n      <\/div>\n      <div style=\"position: relative; border-radius: 24px; background: radial-gradient(120% 100% at 50% 20%, #FFFFFF 0%, #EEEDE3 60%, #E4E2D6 100%); border: 1px solid rgba(23,25,15,0.08); overflow: hidden;\">\n        <model-viewer loading=\"lazy\" src=\"https://d3u0tzju9qaucj.cloudfront.net/7d051b5a-7bfe-49fe-a484-24e7b3a9458a/ffabc2d1-f9aa-4b38-94e1-a8b9fd137d9b.glb\" alt=\"Interactief 3D-model van de BRISKI elektrische driewiel step\" camera-controls auto-rotate auto-rotate-delay=\"1200\" rotation-per-second=\"20deg\" shadow-intensity=\"1.1\" shadow-softness=\"0.9\" exposure=\"1.05\" touch-action=\"pan-y\" ar ar-modes=\"webxr scene-viewer quick-look\" style=\"width: 100%; height: clamp(380px, 70vh, 640px); display: block; background: transparent;\"><\/model-viewer>\n        <span style=\"position: absolute; bottom: 14px; left: 16px; background: rgba(245,243,236,0.9); border: 1px solid rgba(23,25,15,0.1); border-radius: 100px; padding: 5px 14px; font-size: 12px; font-weight: 600; color: #2A2C20; pointer-events: none;\">&#8635; Sleep om te draaien<\/span>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- GROEN / UITSTOOTVRIJ -->\n  <section id=\"groen\" style=\"background: linear-gradient(135deg, #24350B 0%, #17190F 75%); position: relative; overflow: hidden;\">\n    <div style=\"position: absolute; top: -35%; right: -12%; width: 55vw; height: 55vw; max-width: 680px; max-height: 680px; background: radial-gradient(circle, rgba(168,212,38,0.18), transparent 65%); pointer-events: none;\"><\/div>\n    <div style=\"max-width: 1400px; margin: 0 auto; padding: clamp(64px,9vh,110px) clamp(20px,5vw,64px); position: relative; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px,1fr)); gap: clamp(28px,4vw,64px); align-items: center;\">\n      <div>\n        <span style=\"font-size: 13px; letter-spacing: 0.14em; color: #A8D426; font-weight: 700; text-transform: uppercase;\">&#9135;&#8196; Groen onderweg<\/span>\n        <h2 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 700; font-size: clamp(34px,4.6vw,60px); line-height: 1.05; letter-spacing: -0.03em; margin: 14px 0 18px; color: #F5F3EC;\">100% elektrisch.<br><span style=\"color: #A8D426;\">0% uitstoot.<\/span><\/h2>\n        <p style=\"color: #C7C9BB; font-size: 17px; line-height: 1.6; margin: 0; max-width: 48ch;\">De BRISKI rijdt volledig elektrisch: schoon en zonder uitstoot. Zo beweeg je vrij door de stad en zorg je tegelijk goed voor de wereld om je heen.<\/p>\n      <\/div>\n      <div style=\"display: flex; flex-direction: column; align-items: center; gap: 22px;\">\n        <div style=\"text-align: center;\">\n          <div style=\"font-family: 'Bricolage Grotesque',sans-serif; font-size: clamp(80px,10vw,140px); font-weight: 800; letter-spacing: -0.04em; line-height: 1; color: #A8D426;\">0<\/div>\n          <div style=\"color: #F5F3EC; font-size: 18px; font-weight: 600; margin-top: 6px;\">uitstoot onderweg<\/div>\n        <\/div>\n        <div style=\"display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;\">\n          <span style=\"border: 1px solid rgba(168,212,38,0.45); color: #C7E56A; border-radius: 100px; padding: 7px 16px; font-size: 14px; font-weight: 600;\">Stil onderweg<\/span>\n          <span style=\"border: 1px solid rgba(168,212,38,0.45); color: #C7E56A; border-radius: 100px; padding: 7px 16px; font-size: 14px; font-weight: 600;\">Milieubewust<\/span>\n          <span style=\"border: 1px solid rgba(168,212,38,0.45); color: #C7E56A; border-radius: 100px; padding: 7px 16px; font-size: 14px; font-weight: 600;\">Goed voor je omgeving<\/span>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- SPECS -->\n  <section id=\"specs\" style=\"max-width: 1400px; margin: 0 auto; padding: clamp(72px,10vh,130px) clamp(20px,5vw,64px);\">\n    <div style=\"margin-bottom: 48px;\">\n      <span style=\"font-size: 13px; letter-spacing: 0.14em; color: #5B7A0E; font-weight: 700; text-transform: uppercase;\">&#9135;&#8196; Specificaties<\/span>\n      <h2 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 700; font-size: clamp(34px,5vw,64px); line-height: 1.0; letter-spacing: -0.03em; margin: 14px 0 0;\">De cijfers<\/h2>\n    <\/div>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 1px; background: rgba(23,25,15,0.08); border: 1px solid rgba(23,25,15,0.06); border-radius: 28px; overflow: hidden; box-shadow: 0 16px 48px rgba(23,25,15,0.04);\">\n      <div style=\"background: #FBFAF4; padding: 32px 28px;\"><div style=\"font-family: 'Bricolage Grotesque',sans-serif; font-size: clamp(40px,5vw,58px); font-weight: 700; letter-spacing: -0.03em; color: #17190F;\">47<span style=\"font-size: 22px; color: #8A8C7C; font-weight: 500;\"> kg<\/span><\/div><div style=\"color: #6B6D5F; font-size: 14px; margin-top: 6px;\">Basisgewicht<\/div><\/div>\n      <div style=\"background: #FBFAF4; padding: 32px 28px;\"><div style=\"font-family: 'Bricolage Grotesque',sans-serif; font-size: clamp(40px,5vw,58px); font-weight: 700; letter-spacing: -0.03em; color: #5B7A0E;\">33<span style=\"font-size: 22px; color: #8A8C7C; font-weight: 500;\"> kg<\/span><\/div><div style=\"color: #6B6D5F; font-size: 14px; margin-top: 6px;\">Met Li-ion accu (meerprijs)<\/div><\/div>\n      <div style=\"background: #FBFAF4; padding: 32px 28px;\"><div style=\"font-family: 'Bricolage Grotesque',sans-serif; font-size: clamp(40px,5vw,58px); font-weight: 700; letter-spacing: -0.03em; color: #17190F;\">0<span style=\"font-size: 22px; color: #8A8C7C; font-weight: 500;\"> uitstoot<\/span><\/div><div style=\"color: #6B6D5F; font-size: 14px; margin-top: 6px;\">Volledig elektrische aandrijving<\/div><\/div>\n      <div style=\"background: #FBFAF4; padding: 32px 28px;\"><div style=\"font-family: 'Bricolage Grotesque',sans-serif; font-size: clamp(40px,5vw,58px); font-weight: 700; letter-spacing: -0.03em; color: #17190F;\">~50<span style=\"font-size: 22px; color: #8A8C7C; font-weight: 500;\"> km<\/span><\/div><div style=\"color: #6B6D5F; font-size: 14px; margin-top: 6px;\">Actieradius<\/div><\/div>\n    <\/div>\n    <p style=\"color: #9A9C8C; font-size: 13px; margin-top: 16px;\">Actieradius circa 50 km, afhankelijk van accu, belasting en gebruik.<\/p>\n  <\/section>\n\n  <!-- PROEFRIT CTA -->\n  <section id=\"proefrit\" style=\"padding: clamp(24px,5vw,64px) clamp(20px,5vw,64px);\">\n    <div style=\"max-width: 1400px; margin: 0 auto; background: linear-gradient(135deg, #A8D426, #8FBF1A, #A8D426); background-size: 200% 200%; animation: brk-gradient 6s ease infinite; border-radius: 36px; box-shadow: 0 24px 56px rgba(168,212,38,0.15); padding: clamp(48px,7vw,96px) clamp(28px,5vw,72px); position: relative; overflow: hidden;\">\n      <div style=\"position: absolute; right: -6%; top: -30%; width: 40%; height: 160%; background: repeating-linear-gradient(120deg, rgba(18,20,12,0.06), rgba(18,20,12,0.06) 14px, transparent 14px, transparent 28px); border-radius: 40px;\"><\/div>\n      <span style=\"font-size: 13px; letter-spacing: 0.14em; color: #3B4718; font-weight: 700; text-transform: uppercase;\">&#9135;&#8196; Proberen is hebben<\/span>\n      <h2 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 700; font-size: clamp(36px,6vw,80px); line-height: 0.95; letter-spacing: -0.035em; margin: 16px 0 0; color: #12140C; max-width: 16ch;\">Boek een proefrit en voel het verschil.<\/h2>\n      <p style=\"color: #2A3312; font-size: 18px; line-height: 1.5; margin: 22px 0 34px; max-width: 46ch; font-weight: 500;\">Ervaar zelf hoe licht en soepel de BRISKI rijdt. Kies een moment dat jou uitkomt \u2014 wij zorgen dat de BRISKI klaarstaat. Geen verplichtingen.<\/p>\n      <div style=\"display: flex; flex-wrap: wrap; gap: 14px;\">\n        <a href=\"#contact\" style=\"background: #12140C; color: #F5F3EC; text-decoration: none; font-size: 16px; font-weight: 700; padding: 17px 34px; border-radius: 100px;\">Plan mijn proefrit<\/a>\n        <a href=\"tel:+31000000000\" style=\"border: 1.5px solid rgba(18,20,12,0.4); color: #12140C; text-decoration: none; font-size: 16px; font-weight: 700; padding: 17px 34px; border-radius: 100px;\">Bel ons direct<\/a>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- PRIJS -->\n  <sc-if value=\"{{ showPricing }}\" hint-placeholder-val=\"{{ true }}\">\n  <section id=\"prijs\" style=\"max-width: 1400px; margin: 0 auto; padding: clamp(72px,10vh,130px) clamp(20px,5vw,64px);\">\n    <div style=\"text-align: center; margin-bottom: 54px;\">\n      <span style=\"font-size: 13px; letter-spacing: 0.14em; color: #5B7A0E; font-weight: 700; text-transform: uppercase;\">&#9135;&#8196; Configuraties<\/span>\n      <h2 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 700; font-size: clamp(34px,5vw,64px); line-height: 1.0; letter-spacing: -0.03em; margin: 14px auto 0; max-width: 18ch;\">Kies jouw BRISKI<\/h2>\n    <\/div>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); gap: 18px; max-width: 900px; margin: 0 auto;\">\n      <div style=\"border: 1px solid rgba(23,25,15,0.08); border-radius: 28px; padding: 40px; background: rgba(251,250,244,0.8); backdrop-filter: blur(8px);\">\n        <h3 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 600; font-size: 24px; margin: 0;\">Standaard<\/h3>\n        <p style=\"color: #6B6D5F; font-size: 14px; margin: 8px 0 22px;\">De complete BRISKI ervaring.<\/p>\n        <div style=\"font-family: 'Bricolage Grotesque',sans-serif; font-size: 44px; font-weight: 700; letter-spacing: -0.03em;\">op aanvraag<\/div>\n        <ul style=\"list-style: none; padding: 22px 0 0; margin: 0; display: flex; flex-direction: column; gap: 12px;\">\n          <li style=\"color: #45473B; font-size: 15px; display: flex; gap: 10px;\"><span style=\"color:#5B7A0E;\">\u2713<\/span> Basisgewicht 47 kg<\/li>\n          <li style=\"color: #45473B; font-size: 15px; display: flex; gap: 10px;\"><span style=\"color:#5B7A0E;\">\u2713<\/span> Volledig elektrisch<\/li>\n          <li style=\"color: #45473B; font-size: 15px; display: flex; gap: 10px;\"><span style=\"color:#5B7A0E;\">\u2713<\/span> Standaard accu<\/li>\n        <\/ul>\n        <a href=\"#contact\" style=\"display: block; text-align: center; margin-top: 28px; border: 1px solid rgba(23,25,15,0.25); color: #17190F; text-decoration: none; font-weight: 700; padding: 14px; border-radius: 100px;\">Vraag prijs aan<\/a>\n      <\/div>\n      <div style=\"border: 2px solid rgba(168,212,38,0.4); border-radius: 28px; padding: 40px; background: linear-gradient(135deg, #17190F, #1C1E12); position: relative; overflow: hidden; box-shadow: 0 24px 56px rgba(23,25,15,0.2);\">\n        <span style=\"position: absolute; top: -1px; right: 32px; background: linear-gradient(135deg, #A8D426, #8FBF1A); color: #12140C; font-size: 11px; font-weight: 700; padding: 8px 18px; border-radius: 0 0 12px 12px; letter-spacing: 0.06em;\">MEEST GEKOZEN<\/span>\n        <h3 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 600; font-size: 24px; margin: 0; color: #A8D426;\">Li-ion<\/h3>\n        <p style=\"color: #C7C9BB; font-size: 14px; margin: 8px 0 22px;\">Lichter, verder, moeitelozer.<\/p>\n        <div style=\"font-family: 'Bricolage Grotesque',sans-serif; font-size: 44px; font-weight: 700; letter-spacing: -0.03em; color: #F5F3EC;\">op aanvraag<\/div>\n        <ul style=\"list-style: none; padding: 22px 0 0; margin: 0; display: flex; flex-direction: column; gap: 12px;\">\n          <li style=\"color: #E7E8DD; font-size: 15px; display: flex; gap: 10px;\"><span style=\"color:#A8D426;\">\u2713<\/spa style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 700; font-size: clamp(34px,5vw,64px); line-height: 1.0; letter-spacing: -0.03em; margin: 14px auto 0; max-width: 22ch;\">De perfecte stap tussen fiets en scootmobiel.<\/h2>\n      <\/div>\n      <div style=\"margin-bottom: 48px; border-radius: 28px; overflow: hidden; box-shadow: 0 16px 48px rgba(23,25,15,0.08);\">\n        <img loading=\"lazy\" src=\"https://d8j0ntlcm91z4.cloudfront.net/user_3F2q2CvHTV5b7m7TgMzyzghqiWp/hf_20260705_115511_04bcadd8-d7c2-4b2d-bac1-80ec2064c022.png\" alt=\"Vrouw rijdt op een BRISKI door een Nederlandse winkelstraat\" style=\"width: 100%; height: auto; display: block; max-height: 480px; object-fit: cover; object-position: center 30%;\">\n      <\/div>\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); gap: 20px;\">\n        <div style=\"border: 1px solid rgba(23,25,15,0.08); border-radius: 24px; padding: 36px; background: #FFFFFF;\">\n          <div style=\"width: 46px; height: 46px; border-radius: 12px; background: rgba(168,212,38,0.2); display: flex; align-items: center; justify-content: center; margin-bottom: 22px; font-size: 22px;\">&#128694;<\/div>\n          <h3 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 600; font-size: 21px; margin: 0 0 10px; letter-spacing: -0.02em;\">Nog niet aan een scootmobiel toe<\/h3>\n          <p style=\"color: #6B6D5F; font-size: 15px; line-height: 1.6; margin: 0;\">Je wilt wel comfortabel de stad in, maar een scootmobiel voelt als een stap te ver. De BRISKI is modern, licht en wendbaar \u2014 zonder het gevoel van een hulpmiddel.<\/p>\n        <\/div>\n        <div style=\"border: 1px solid rgba(23,25,15,0.08); border-radius: 24px; padding: 36px; background: #FFFFFF;\">\n          <div style=\"width: 46px; height: 46px; border-radius: 12px; background: rgba(168,212,38,0.2); display: flex; align-items: center; justify-content: center; margin-bottom: 22px; font-size: 22px;\">&#127961;<\/div>\n          <h3 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 600; font-size: 21px; margin: 0 0 10px; letter-spacing: -0.02em;\">Modern stadsvervoer<\/h3>\n          <p style=\"color: #6B6D5F; font-size: 15px; line-height: 1.6; margin: 0;\">Ideaal voor dagelijkse boodschappen, een bezoek aan de stad of een avondje uit \u2014 compact en zonder parkeerstress.<\/p>\n        <\/div>\n        <div style=\"border: 1px solid rgba(23,25,15,0.08); border-radius: 24px; padding: 36px; background: #FFFFFF;\">\n          <div style=\"width: 46px; height: 46px; border-radius: 12px; background: rgba(168,212,38,0.2); display: flex; align-items: center; justify-content: center; margin-bottom: 22px; font-size: 22px;\">&#128663;<\/div>\n          <h3 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 600; font-size: 21px; margin: 0 0 10px; letter-spacing: -0.02em;\">Meenemen op reis<\/h3>\n          <p style=\"color: #6B6D5F; font-size: 15px; line-height: 1.6; margin: 0;\">Eenvoudig te vervoeren in de auto of camper. Ideaal om op vakantie de omgeving te verkennen \u2014 met Li-ion accu slechts 33 kg.<\/p>\n        <\/div>\n      <\/div>\n      <div style=\"text-align: center; margin-top: 44px;\">\n        <a href=\"#proefrit\" style=\"background: #17190F; color: #F5F3EC; text-decoration: none; font-size: 16px; font-weight: 700; padding: 18px 36px; border-radius: 100px; display: inline-block;\">Boek een proefrit en ervaar het zelf &#8594;<\/a>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- ZAKELIJK -->\n  <section id=\"zakelijk\" style=\"background: linear-gradient(180deg, #ECEAE0, #E4E2D6); border-top: 1px solid rgba(23,25,15,0.04);\">\n    <div style=\"max-width: 1400px; margin: 0 auto; padding: clamp(72px,10vh,130px) clamp(20px,5vw,64px);\">\n      <div style=\"text-align: center; max-width: 780px; margin: 0 auto 44px;\">\n        <span style=\"font-size: 13px; letter-spacing: 0.14em; color: #5B7A0E; font-weight: 700; text-transform: uppercase;\">&#9135;&#8196; Zakelijk<\/span>\n        <h2 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 700; font-size: clamp(34px,4.6vw,60px); line-height: 1.05; letter-spacing: -0.03em; margin: 14px 0 18px;\">Ook op de werkvloer.<\/h2>\n        <p style=\"color: #55574A; font-size: 17px; line-height: 1.6; margin: 0;\">Van distributiecentrum tot luchthaven: overal waar medewerkers dagelijks grote afstanden binnen &#233;&#233;n locatie afleggen, is de BRISKI een snel, stil en uitstootvrij alternatief. Soepel tussen mensen en stellingen, en compact te parkeren.<\/p>\n      <\/div>\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(300px,1fr)); gap: clamp(16px,2.5vw,28px);\">\n        <figure style=\"margin: 0; border-radius: 20px; overflow: hidden; border: 1px solid rgba(23,25,15,0.08); background: #FBFAF4; box-shadow: 0 14px 32px rgba(23,25,15,0.10);\"><img loading=\"lazy\" src=\"https://d8j0ntlcm91z4.cloudfront.net/user_3F2q2CvHTV5b7m7TgMzyzghqiWp/hf_20260705_113325_59d112fa-2530-4828-a6f0-bbb5c363135b.png\" alt=\"Medewerker rijdt op de BRISKI door een distributiecentrum\" style=\"width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block;\"><figcaption style=\"padding: 18px 22px;\"><span style=\"color: #17190F; font-size: 16px; font-weight: 700;\">Distributiecentra<\/span><br><span style=\"color: #6B6D5F; font-size: 14px; line-height: 1.5;\">Snel van dock naar stelling, zonder uitstoot op de werkvloer.<\/span><\/figcaption><\/figure>\n        <figure style=\"margin: 0; border-radius: 20px; overflow: hidden; border: 1px solid rgba(23,25,15,0.08); background: #FBFAF4; box-shadow: 0 14px 32px rgba(23,25,15,0.10);\"><img loading=\"lazy\" src=\"https://d8j0ntlcm91z4.cloudfront.net/user_3F2q2CvHTV5b7m7TgMzyzghqiWp/hf_20260705_113638_9c3571b4-f8c3-4911-88a4-f5e806139da3.png\" alt=\"Luchthavenmedewerker rijdt op een witte BRISKI door de terminal\" style=\"width: 100%; aspect-ratio: 16/9; object-f /div>\n            <div style=\"display: flex; align-items: flex-start; gap: 14px;\"><span style=\"color: #A8D426; font-size: 20px; line-height: 1.2; flex-shrink: 0;\">&#10003;<\/span><div><span style=\"color: #F5F3EC; font-size: 16px; font-weight: 600; line-height: 1.5;\">Direct contact met de importeur<\/span><br><span style=\"color: #9A9C8C; font-size: 14px; line-height: 1.5;\">Korte lijnen, snelle levering en persoonlijke begeleiding<\/span><\/div><\/div>\n          <\/div>\n          <div style=\"display: flex; flex-wrap: wrap; gap: 14px; margin-top: 32px;\">\n            <a href=\"mailto:info@briski.nl?subject=Dealer%20aanvraag\" style=\"background: #A8D426; color: #12140C; text-decoration: none; font-size: 16px; font-weight: 700; padding: 16px 32px; border-radius: 100px;\">Dealer worden &#8594;<\/a>\n            <a href=\"dealer.html\" style=\"border: 1.5px solid rgba(168,212,38,0.3); color: #A8D426; text-decoration: none; font-size: 16px; font-weight: 600; padding: 15px 30px; border-radius: 100px;\">Meer informatie<\/a>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- CONTACT / FOOTER -->\n  <footer id=\"contact\" style=\"background: linear-gradient(180deg, #17190F, #111308);\">\n    <div style=\"max-width: 1400px; margin: 0 auto; padding: clamp(56px,8vh,100px) clamp(20px,5vw,64px);\">\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px,1fr)); gap: 40px; align-items: start;\">\n        <div>\n          <div style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 800; font-size: clamp(48px,7vw,80px); letter-spacing: -0.05em; line-height: 1; background: linear-gradient(180deg, #F5F3EC, rgba(245,243,236,0.6)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;\">BRISKI<\/div>\n          <p style=\"color: #9A9C8C; font-size: 16px; line-height: 1.6; margin: 20px 0 0; max-width: 34ch;\">Een nieuwe beleving in beweging. De moderne elektrische driewiel step.<\/p>\n        <\/div>\n        <div>\n          <div style=\"font-size: 13px; letter-spacing: 0.08em; color: #7A7C6C; text-transform: uppercase; margin-bottom: 18px;\">Menu<\/div>\n          <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n            <a href=\"#model\" style=\"color: #C7C9BB; text-decoration: none; font-size: 16px;\">Model<\/a>\n            <a href=\"#voordelen\" style=\"color: #C7C9BB; text-decoration: none; font-size: 16px;\">Voordelen<\/a>\n            <a href=\"#specs\" style=\"color: #C7C9BB; text-decoration: none; font-size: 16px;\">Specificaties<\/a>\n            <a href=\"#prijs\" style=\"color: #C7C9BB; text-decoration: none; font-size: 16px;\">Prijs<\/a>\n          <\/div>\n        <\/div>\n        <div>\n          <div style=\"font-size: 13px; letter-spacing: 0.08em; color: #7A7C6C; text-transform: uppercase; margin-bottom: 18px;\">Contact<\/div>\n          <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n            <a href=\"mailto:info@briski.nl\" style=\"color: #C7C9BB; text-decoration: none; font-size: 16px;\">info@briski.nl<\/a>\n            <a href=\"https://www.briski.nl\" style=\"color: #C7C9BB; text-decoration: none; font-size: 16px;\">www.briski.nl<\/a>\n            <a href=\"#proefrit\" style=\"color: #A8D426; text-decoration: none; font-size: 16px; font-weight: 700;\">Proefrit boeken \u2192<\/a>\n          <\/div>\n        <\/div>\n      <\/div>\n      <div style=\"margin-top: 60px; padding-top: 24px; border-top: 1px solid rgba(245,243,236,0.12); display: flex; flex-wrap: wrap; gap: 12px; justify-content: space-between; color: #7A7C6C; font-size: 14px;\">\n        <span>\u00a9 {{ year }} BRISKI. Alle rechten voorbehouden.<\/span>\n        <span>Ontworpen in Nederland.<\/span>\n      <\/div>\n    <\/div>\n  <\/footer>\n\n<\/div>\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: &quot;100%&quot;, &quot;height&quot;: 900}, &quot;showPricing&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Secties&quot;}, &quot;showReviews&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Secties&quot;}}\">\nclass Component extends DCLogic {\n  state = { mobileOpen: false, openFaq: 0, color: 0 };\n\n  renderVals() {\n    const palette = [\n      { name: \"Rood\", img: \"assets/briski.png\", swatch: \"#C62828\" },\n      { name: \"Oranje\", img: \"assets/briski-oranje.jpeg\", swatch: \"#E38A1B\" },\n      { name: \"Groen\", img: \"assets/briski-groen.jpeg\", swatch: \"#4E7A32\" },\n    ];\n    const colors = palette.map((c, i) => ({\n      name: c.name,\n      swatch: c.swatch,\n      ring: this.state.color === i ? c.swatch : \"transparent\",\n      select: () => this.setState({ color: i }),\n    }));\n    const active = palette[this.state.color] || palette[0];\n\n    const faqData = [\n      { q: \"Heb ik een rijbewijs nodig voor de BRISKI?\", a: \"Dit hangt af van de uitvoering en de lokale regelgeving. Tijdens een proefrit informeren we je graag over wat voor jouw situatie geldt.\" },\n      { q: \"Wat is het verschil tussen de standaard en de Li-ion accu?\", a: \"De standaarduitvoering weegt 47 kg. Met de optionele Li-ion accu (tegen meerprijs) daalt het totaalgewicht naar 33 kg, wat rijden en verplaatsen nog lichter maakt.\" },\n      { q: \"Waar kan ik de BRISKI parkeren?\", a: \"Dankzij het compacte formaat vind je vrijwel overal een plek. De BRISKI is bovendien eenvoudig te vervoeren, ideaal om mee te nemen op reis.\" },\n      { q: \"Hoe snel gaat de BRISKI?\", a: \"De maximale snelheid is 25 km/u. Deze is geheel instelbaar via de draaibare begrenzer aan het stuur. Het actieradius is circa 50 km.\" },\n      { q: \"Kan de BRISKI worden aangepast?\", a: \"Ja, de BRISKI kan worden uitgevoerd met een zadel en rugleuning voor iedereen die iets meer steun wil.\" },\n      { q: \"Kan ik eerst een proefrit maken?\", a: \"Zeker. Proberen is hebben. Boek een proefrit via de knop bovenaan of neem contact met ons op, dan zetten we de BRISKI voor je klaar.\" },\n    ];\n    const faqs = faqData.map((f, i) => ({\n      q: f.q,\n      a: f.a,\n      open: this.state.openFaq === i,\n      sign: this.state.openFaq === i ? \"\u2013\" : \"+\",\n      toggle: () => this.setState(s => ({ openFaq: s.openFaq === i ? -1 : i })),\n    }));\n\n    return {\n      mobileOpen: this.state.mobileOpen,\n      toggleMobile: () => this.setState(s => ({ mobileOpen: !s.mobileOpen })),\n      colors,\n      showRed: this.state.color === 0,\n      showOranje: this.state.color === 1,\n      showGroen: this.state.color === 2,\n      activeColorName: active.name,\n      faqs,\n      showPricing: this.props.showPricing ?? true,\n      showReviews: this.props.showReviews ?? true,\n      year: new Date().getFullYear(),\n    };\n  }\n}\n<\/script>\n\n\n<\/body><\/html>"</script>
