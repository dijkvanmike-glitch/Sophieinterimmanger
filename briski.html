    var p = document.body || document.documentElement;

    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

id rgba(168,212,38,0.3); border-radius: 100px; font-size: 12px; letter-spacing: 0.06em; color: #4B5B10; font-weight: 700; background: linear-gradient(135deg, rgba(168,212,38,0.12), rgba(168,212,38,0.06)); animation: brk-fade 0.8s ease both;\">\n        <span style=\"width: 7px; height: 7px; border-radius: 50%; background: #A8D426; animation: brk-pulse 2s ease infinite;\"><\u002Fspan>\n        NIEUW \u00b7 ELEKTRISCH\n      <\u002Fdiv>\n\n      <h1 style=\"font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: clamp(48px, 7vw, 104px); line-height: 1.15; letter-spacing: -0.04em; margin: 28px 0 0; max-width: 12ch; animation: brk-rise 0.9s cubic-bezier(0.16,1,0.3,1) both;\">\n        Een nieuwe beleving in <span style=\"font-style: italic; color: #6B8F1A;\">beweging<\u002Fspan>\n      <\u002Fh1>\n\n      <p style=\"font-size: clamp(17px, 1.6vw, 21px); line-height: 1.5; color: #55574A; max-width: 46ch; margin: 28px 0 0; animation: brk-rise 0.9s cubic-bezier(0.16,1,0.3,1) 0.1s both;\">\n        De BRISKI elektrische driewiel step is een modern vervoermiddel voor iedereen die nog niet aan een scootmobiel toe is, of graag een wendbaar en milieubewust vervoermiddel wil voor in de stad of mee op reis.\n      <\u002Fp>\n\n      <div style=\"display: flex; flex-wrap: wrap; gap: 16px; margin-top: 38px; animation: brk-rise 0.9s cubic-bezier(0.16,1,0.3,1) 0.2s both;\">\n        <a href=\"#proefrit\" style=\"background: #17190F; color: #F5F3EC; text-decoration: none; font-size: 16px; font-weight: 700; padding: 18px 36px; border-radius: 100px; transition: all .25s ease; box-shadow: 0 8px 24px rgba(23,25,15,0.15);\" style-hover=\"transform: translateY(-2px); box-shadow: 0 12px 32px rgba(23,25,15,0.2);\">Boek een proefrit &#8594;<\u002Fa>\n        <a href=\"#specs\" style=\"border: 1.5px solid rgba(23,25,15,0.2); color: #17190F; text-decoration: none; font-size: 16px; font-weight: 600; padding: 17px 34px; border-radius: 100px; transition: all .25s ease; background: transparent;\" style-hover=\"border-color: #5B7A0E; color: #5B7A0E; background: rgba(168,212,38,0.06);\">Bekijk specificaties<\u002Fa>\n      <\u002Fdiv>\n\n      <div style=\"display: flex; gap: 32px; margin-top: 44px; flex-wrap: wrap; animation: brk-rise 0.9s cubic-bezier(0.16,1,0.3,1) 0.28s both;\">\n        <div><div style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 800; font-size: 34px; letter-spacing: -0.03em;\">47 kg<\u002Fdiv><div style=\"color: #8A8C7C; font-size: 13px; font-weight: 500; margin-top: 2px;\">Vanaf gewicht<\u002Fdiv><\u002Fdiv>\n        <div style=\"width: 1px; background: linear-gradient(180deg, transparent, rgba(23,25,15,0.15), transparent);\"><\u002Fdiv>\n        <div><div style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 800; font-size: 34px; letter-spacing: -0.03em; background: linear-gradient(135deg, #5B7A0E, #A8D426); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;\">100%<\u002Fdiv><div style=\"color: #8A8C7C; font-size: 13px; font-weight: 500; margin-top: 2px;\">Elektrisch<\u002Fdiv><\u002Fdiv>\n        <div style=\"width: 1px; background: linear-gradient(180deg, transparent, rgba(23,25,15,0.15), transparent);\"><\u002Fdiv>\n        <div><div style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 800; font-size: 34px; letter-spacing: -0.03em;\">0<\u002Fdiv><div style=\"color: #8A8C7C; font-size: 13px; font-weight: 500; margin-top: 2px;\">Uitstoot<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"position: relative; animation: brk-rise 1s cubic-bezier(0.16,1,0.3,1) 0.25s both;\">\n      <div style=\"position: relative; border-radius: 36px; overflow: hidden; background: radial-gradient(120% 100% at 60% 15%, #FFFFFF 0%, #F0EFE5 45%, #E8E6DA 100%); border: 1px solid rgba(23,25,15,0.06); padding: clamp(20px,4vw,36px); display: flex; align-items: center; justify-content: center; box-shadow: 0 32px 64px rgba(23,25,15,0.08), 0 8px 20px rgba(23,25,15,0.04);\">\n        <sc-if value=\"{{ showRed }}\" hint-placeholder-val=\"{{ true }}\"><img src=\"b1b67021-26a6-456b-aa7c-824007f4b1fb\" alt=\"De BRISKI elektrische driewiel step in het rood\" style=\"width: 100%; max-width: 460px; height: auto; display: block; filter: drop-shadow(0 30px 40px rgba(23,25,15,0.18));\"><\u002Fsc-if>\n        <sc-if value=\"{{ showOranje }}\" hint-placeholder-val=\"{{ false }}\"><img src=\"3db5518b-791d-479c-b9e7-cc8e1739d0bd\" alt=\"De BRISKI elektrische driewiel step in het oranje\" style=\"width: 100%; max-width: 460px; height: auto; display: block; filter: drop-shadow(0 30px 40px rgba(23,25,15,0.18));\"><\u002Fsc-if>\n        <sc-if value=\"{{ showGroen }}\" hint-placeholder-val=\"{{ false }}\"><img src=\"77b62cea-ed2c-44a4-bc36-e4a4f2efa1ae\" alt=\"De BRISKI elektrische driewiel step in het groen\" style=\"width: 100%; max-width: 460px; height: auto; display: block; filter: drop-shadow(0 30px 40px rgba(23,25,15,0.18));\"><\u002Fsc-if>\n        <span style=\"position: absolute; top: 20px; left: 20px; background: linear-gradient(135deg, rgba(168,212,38,0.92), rgba(91,122,14,0.92)); backdrop-filter: blur(8px); color: #12140C; font-size: 11px; font-weight: 700; padding: 8px 16px; border-radius: 100px; letter-spacing: 0.06em;\">BRISKI<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display: flex; align-items: center; gap: 16px; margin-top: 24px; padding: 12px 20px; background: rgba(251,250,244,0.8); backdrop-filter: blur(12px); border-radius: 100px; border: 1px solid rgba(23,25,15,0.06); width: fit-content;\">\n        <sc-for list=\"{{ colors }}\" as=\"c\" hint-placeholder-count=\"3\">\n          <button onclick=\"{{ c.select }}\" aria-label=\"{{ c.name }}\" title=\"{{ c.name }}\" style=\"width: 36px; height: 36px; border-radius: 50%; background: {{ c.swatch }}; border: 3px solid {{ c.ring }}; outline: none; cursor: pointer; padding: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: transform 0.2s ease;\"><\u002Fbutton>\n        <\u002Fsc-for>\n        <span style=\"color: #55574A; font-size: 14px; font-weight: 600;\">{{ activeColorName }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- MARQUEE -->\n  <div style=\"border-top: 1px solid rgba(23,25,15,0.06); border-bottom: 1px solid rgba(23,25,15,0.06); padding: 24px 0; overflow: hidden; white-space: nowrap; background: #17190F; position: relative;\">\n    <div style=\"position: absolute; left: 0; top: 0; bottom: 0; width: 80px; background: linear-gradient(90deg, #17190F, transparent); z-index: 2;\"><\u002Fdiv>\n    <div style=\"position: absolute; right: 0; top: 0; bottom: 0; width: 80px; background: linear-gradient(-90deg, #17190F, transparent); z-index: 2;\"><\u002Fdiv>\n    <div style=\"display: inline-flex; gap: 0; animation: brk-marquee 26s linear infinite; will-change: transform;\">\n      <span style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 600; font-size: clamp(20px,2.4vw,30px); color: #F5F3EC; letter-spacing: -0.01em;\">ZEER WENDBAAR&nbsp;&nbsp;<span style=\"color:#A8D426;\">\u2726<\u002Fspan>&nbsp;&nbsp;UITERST STABIEL&nbsp;&nbsp;<span style=\"color:#A8D426;\">\u2726<\u002Fspan>&nbsp;&nbsp;MILIEUBEWUST&nbsp;&nbsp;<span style=\"color:#A8D426;\">\u2726<\u002Fspan>&nbsp;&nbsp;EENVOUDIG TE VERVOEREN&nbsp;&nbsp;<span style=\"color:#A8D426;\">\u2726<\u002Fspan>&nbsp;&nbsp;MAX 25 KM/U&nbsp;&nbsp;<span style=\"color:#A8D426;\">\u2726<\u002Fspan>&nbsp;&nbsp;<\u002Fspan>\n      <span style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 600; font-size: clamp(20px,2.4vw,30px); color: #F5F3EC; letter-spacing: -0.01em;\">ZEER WENDBAAR&nbsp;&nbsp;<span style=\"color:#A8D426;\">\u2726<\u002Fspan>&nbsp;&nbsp;UITERST STABIEL&nbsp;&nbsp;<span style=\"color:#A8D426;\">\u2726<\u002Fspan>&nbsp;&nbsp;MILIEUBEWUST&nbsp;&nbsp;<span style=\"color:#A8D426;\">\u2726<\u002Fspan>&nbsp;&nbsp;EENVOUDIG TE VERVOEREN&nbsp;&nbsp;<span style=\"color:#A8D426;\">\u2726<\u002Fspan>&nbsp;&nbsp;MAX 25 KM/U&nbsp;&nbsp;<span style=\"color:#A8D426;\">\u2726<\u002Fspan>&nbsp;&nbsp;<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- VOORDELEN -->\n  <section id=\"voordelen\" style=\"max-width: 1440px; margin: 0 auto; padding: clamp(80px,12vh,150px) clamp(20px,5vw,64px);\">\n    <div style=\"display: flex; align-items: flex-end; justify-content: space-between; gap: 32px; flex-wrap: wrap; margin-bottom: 64px;\">\n      <div>\n        <span style=\"font-size: 13px; letter-spacing: 0.14em; color: #5B7A0E; font-weight: 700; text-transform: uppercase;\">&#9135;&#8196; Waarom BRISKI<\u002Fspan>\n        <h2 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 700; font-size: clamp(36px,5.5vw,72px); line-height: 1.0; letter-spacing: -0.03em; margin: 18px 0 0; max-width: 15ch;\">Alles wat de stad nodig heeft.<\u002Fh2>\n      <\u002Fdiv>\n      <p style=\"color: #6B6D5F; font-size: 16px; line-height: 1.6; max-width: 34ch;\">Compact, licht en volledig elektrisch. Ontdek waarom de BRISKI bij jou past.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px;\">\n      <div style=\"border: 1px solid rgba(23,25,15,0.08); border-radius: 24px; padding: 36px; background: rgba(251,250,244,0.8); backdrop-filter: blur(8px); transition: all 0.3s ease;\" style-hover=\"transform: translateY(-4px); box-shadow: 0 16px 40px rgba(23,25,15,0.06); border-color: rgba(168,212,38,0.25);\">\n        <div style=\"width: 46px; height: 46px; border-radius: 12px; background: rgba(168,212,38,0.2); display: flex; align-items: center; justify-content: center; margin-bottom: 22px;\"><span style=\"width: 18px; height: 18px; border: 2.5px solid #5B7A0E; border-radius: 50% 50% 50% 0; transform: rotate(-45deg);\"><\u002Fspan><\u002Fdiv>\n        <h3 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 600; font-size: 23px; margin: 0 0 10px; letter-spacing: -0.02em;\">Zeer wendbaar<\u002Fh3>\n        <p style=\"color: #6B6D5F; font-size: 15px; line-height: 1.6; margin: 0;\">Uiterst wendbaar en stabiel. Rijd moeiteloos door drukke straten en smalle paden.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border: 1px solid rgba(23,25,15,0.08); border-radius: 24px; padding: 36px; background: rgba(251,250,244,0.8); backdrop-filter: blur(8px); transition: all 0.3s ease;\">\n        <div style=\"width: 46px; height: 46px; border-radius: 12px; background: rgba(168,212,38,0.2); display: flex; align-items: center; justify-content: center; margin-bottom: 22px;\"><span style=\"width: 20px; height: 20px; border: 2.5px solid #5B7A0E; border-radius: 50%; border-right-color: transparent; transform: rotate(45deg);\"><\u002Fspan><\u002Fdiv>\n        <h3 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 600; font-size: 23px; margin: 0 0 10px; letter-spacing: -0.02em;\">Milieuvriendelijk<\u002Fh3>\n        <p style=\"color: #6B6D5F; font-size: 15px; line-height: 1.6; margin: 0;\">Volledig elektrisch en milieubewust. Max. 25 km/u, instelbaar via de draaibare begrenzer aan het stuur.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border: 1px solid rgba(23,25,15,0.08); border-radius: 24px; padding: 36px; background: rgba(251,250,244,0.8); backdrop-filter: blur(8px); transition: all 0.3s ease;\">\n        <div style=\"width: 46px; height: 46px; border-radius: 12px; background: rgba(168,212,38,0.2); display: flex; align-items: center; justify-content: center; margin-bottom: 22px;\"><span style=\"width: 18px; height: 18px; border: 2.5px solid #5B7A0E; border-radius: 4px;\"><\u002Fspan><\u002Fdiv>\n        <h3 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 600; font-size: 23px; margin: 0 0 10px; letter-spacing: -0.02em;\">Geen parkeerprobleem<\u002Fh3>\n        <p style=\"color: #6B6D5F; font-size: 15px; line-height: 1.6; margin: 0;\">Zo compact dat je overal een plek vindt. Zet 'm neer waar een fiets past.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border: 1.5px solid rgba(168,212,38,0.25); border-radius: 24px; padding: 36px; background: linear-gradient(135deg, #17190F, #1E2014); position: relative; overflow: hidden;\">\n        <div style=\"width: 46px; height: 46px; border-radius: 12px; background: rgba(168,212,38,0.25); display: flex; align-items: center; justify-content: center; margin-bottom: 22px;\"><span style=\"color: #A8D426; font-size: 22px; line-height: 1;\">\u2726<\u002Fspan><\u002Fdiv>\n        <h3 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 600; font-size: 23px; margin: 0 0 10px; letter-spacing: -0.02em; color: #A8D426;\">Proberen is hebben<\u002Fh3>\n        <p style=\"color: #C7C9BB; font-size: 15px; line-height: 1.6; margin: 0;\">E\u00e9n proefrit en je begrijpt het. Ervaar zelf hoe licht bewegen kan zijn.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- MODEL / SHOWCASE -->\n  <section id=\"model\" style=\"background: linear-gradient(180deg, #ECEAE0, #E4E2D6); border-top: 1px solid rgba(23,25,15,0.04);\">\n    <div style=\"max-width: 1400px; margin: 0 auto; padding: clamp(72px,10vh,130px) clamp(20px,5vw,64px); display: grid; grid-template-columns: repeat(auto-fit, minmax(300px,1fr)); gap: clamp(32px,5vw,72px); align-items: center;\">\n      <div>\n        <span style=\"font-size: 13px; letter-spacing: 0.14em; color: #5B7A0E; font-weight: 700; text-transform: uppercase;\">&#9135;&#8196; Het model<\u002Fspan>\n        <h2 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 700; font-size: clamp(34px,4.6vw,60px); line-height: 1.0; letter-spacing: -0.03em; margin: 14px 0 22px;\">Klein van formaat.<br>Groot in beleving.<\u002Fh2>\n        <p style=\"color: #55574A; font-size: 17px; line-height: 1.6; margin: 0 0 28px; max-width: 46ch;\">Elk detail is ontworpen rond lichtheid en gemak. Van het frame tot de optionele Li-ion accu die het gewicht terugbrengt naar slechts 33 kg.<\u002Fp>\n        <ul style=\"list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 14px;\">\n          <li style=\"display: flex; align-items: center; gap: 12px; color: #2A2C20; font-size: 16px;\"><span style=\"color: #5B7A0E;\">\u2192<\u002Fspan> Wendbaar, stabiel en eenvoudig te vervoeren<\u002Fli>\n          <li style=\"display: flex; align-items: center; gap: 12px; color: #2A2C20; font-size: 16px;\"><span style=\"color: #5B7A0E;\">\u2192<\u002Fspan> Optionele Li-ion accu: 33 kg totaalgewicht<\u002Fli>\n          <li style=\"display: flex; align-items: center; gap: 12px; color: #2A2C20; font-size: 16px;\"><span style=\"color: #5B7A0E;\">\u2192<\u002Fspan> Optioneel met zadel en rugleuning<\u002Fli>\n          <li style=\"display: flex; align-items: center; gap: 12px; color: #2A2C20; font-size: 16px;\"><span style=\"color: #5B7A0E;\">\u2192<\u002Fspan> Verkrijgbaar in rood, oranje en groen<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 12px; aspect-ratio: 1/1;\">\n        <div style=\"grid-column: 1 / 3; position: relative; border-radius: 20px; background: radial-gradient(120% 100% at 50% 20%, #FFFFFF 0%, #EEEDE3 60%, #E4E2D6 100%); border: 1px solid rgba(23,25,15,0.08); display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 14px;\"><img src=\"b1b67021-26a6-456b-aa7c-824007f4b1fb\" alt=\"BRISKI in het rood\" style=\"max-width: 88%; max-height: 100%; height: auto; object-fit: contain; filter: drop-shadow(0 18px 24px rgba(23,25,15,0.16));\"><span style=\"position: absolute; bottom: 12px; left: 14px; background: rgba(245,243,236,0.9); border: 1px solid rgba(23,25,15,0.1); border-radius: 100px; padding: 4px 12px; font-size: 12px; font-weight: 600; color: #2A2C20;\">Rood<\u002Fspan><\u002Fdiv>\n        <div style=\"position: relative; border-radius: 20px; background: radial-gradient(120% 100% at 50% 25%, #FFFFFF 0%, #EEEDE3 65%, #E4E2D6 100%); border: 1px solid rgba(23,25,15,0.08); display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 10px;\"><img src=\"3db5518b-791d-479c-b9e7-cc8e1739d0bd\" alt=\"BRISKI in het oranje\" style=\"max-width: 92%; max-height: 100%; height: auto; object-fit: contain;\"><span style=\"position: absolute; bottom: 10px; left: 12px; background: rgba(245,243,236,0.9); border: 1px solid rgba(23,25,15,0.1); border-radius: 100px; padding: 4px 12px; font-size: 12px; font-weight: 600; color: #2A2C20;\">Ook in oranje<\u002Fspan><\u002Fdiv>\n        <div style=\"position: relative; border-radius: 20px; background: radial-gradient(120% 100% at 50% 25%, #FFFFFF 0%, #EEEDE3 65%, #E4E2D6 100%); border: 1px solid rgba(23,25,15,0.08); display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 10px;\"><img src=\"77b62cea-ed2c-44a4-bc36-e4a4f2efa1ae\" alt=\"BRISKI in het groen\" style=\"max-width: 92%; max-height: 100%; height: auto; object-fit: contain;\"><span style=\"position: absolute; bottom: 10px; left: 12px; background: rgba(245,243,236,0.9); border: 1px solid rgba(23,25,15,0.1); border-radius: 100px; padding: 4px 12px; font-size: 12px; font-weight: 600; color: #2A2C20;\">Groen<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SPECS -->\n  <section id=\"specs\" style=\"max-width: 1400px; margin: 0 auto; padding: clamp(72px,10vh,130px) clamp(20px,5vw,64px);\">\n    <div style=\"margin-bottom: 48px;\">\n      <span style=\"font-size: 13px; letter-spacing: 0.14em; color: #5B7A0E; font-weight: 700; text-transform: uppercase;\">&#9135;&#8196; Specificaties<\u002Fspan>\n      <h2 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 700; font-size: clamp(34px,5vw,64px); line-height: 1.0; letter-spacing: -0.03em; margin: 14px 0 0;\">De cijfers<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 1px; background: rgba(23,25,15,0.08); border: 1px solid rgba(23,25,15,0.06); border-radius: 28px; overflow: hidden; box-shadow: 0 16px 48px rgba(23,25,15,0.04);\">\n      <div style=\"background: #FBFAF4; padding: 32px 28px;\"><div style=\"font-family: 'Bricolage Grotesque',sans-serif; font-size: clamp(40px,5vw,58px); font-weight: 700; letter-spacing: -0.03em; color: #17190F;\">47<span style=\"font-size: 22px; color: #8A8C7C; font-weight: 500;\"> kg<\u002Fspan><\u002Fdiv><div style=\"color: #6B6D5F; font-size: 14px; margin-top: 6px;\">Basisgewicht<\u002Fdiv><\u002Fdiv>\n      <div style=\"background: #FBFAF4; padding: 32px 28px;\"><div style=\"font-family: 'Bricolage Grotesque',sans-serif; font-size: clamp(40px,5vw,58px); font-weight: 700; letter-spacing: -0.03em; color: #5B7A0E;\">33<span style=\"font-size: 22px; color: #8A8C7C; font-weight: 500;\"> kg<\u002Fspan><\u002Fdiv><div style=\"color: #6B6D5F; font-size: 14px; margin-top: 6px;\">Met Li-ion accu (meerprijs)<\u002Fdiv><\u002Fdiv>\n      <div style=\"background: #FBFAF4; padding: 32px 28px;\"><div style=\"font-family: 'Bricolage Grotesque',sans-serif; font-size: clamp(40px,5vw,58px); font-weight: 700; letter-spacing: -0.03em; color: #17190F;\">0<span style=\"font-size: 22px; color: #8A8C7C; font-weight: 500;\"> uitstoot<\u002Fspan><\u002Fdiv><div style=\"color: #6B6D5F; font-size: 14px; margin-top: 6px;\">100% elektrisch<\u002Fdiv><\u002Fdiv>\n      <div style=\"background: #FBFAF4; padding: 32px 28px;\"><div style=\"font-family: 'Bricolage Grotesque',sans-serif; font-size: clamp(40px,5vw,58px); font-weight: 700; letter-spacing: -0.03em; color: #17190F;\">~50<span style=\"font-size: 22px; color: #8A8C7C; font-weight: 500;\"> km<\u002Fspan><\u002Fdiv><div style=\"color: #6B6D5F; font-size: 14px; margin-top: 6px;\">Actieradius<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"color: #9A9C8C; font-size: 13px; margin-top: 16px;\">Actieradius circa 50 km. Snelheid max. 25 km/u, instelbaar via draaibare begrenzer. Afhankelijk van accu, gewicht en gebruik.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- PROEFRIT CTA -->\n  <section id=\"proefrit\" style=\"padding: clamp(24px,5vw,64px) clamp(20px,5vw,64px);\">\n    <div style=\"max-width: 1400px; margin: 0 auto; background: linear-gradient(135deg, #A8D426, #8FBF1A, #A8D426); background-size: 200% 200%; animation: brk-gradient 6s ease infinite; border-radius: 36px; box-shadow: 0 24px 56px rgba(168,212,38,0.15); padding: clamp(48px,7vw,96px) clamp(28px,5vw,72px); position: relative; overflow: hidden;\">\n      <div style=\"position: absolute; right: -6%; top: -30%; width: 40%; height: 160%; background: repeating-linear-gradient(120deg, rgba(18,20,12,0.06), rgba(18,20,12,0.06) 14px, transparent 14px, transparent 28px); border-radius: 40px;\"><\u002Fdiv>\n      <span style=\"font-size: 13px; letter-spacing: 0.14em; color: #3B4718; font-weight: 700; text-transform: uppercase;\">&#9135;&#8196; Proberen is hebben<\u002Fspan>\n      <h2 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 700; font-size: clamp(36px,6vw,80px); line-height: 0.95; letter-spacing: -0.035em; margin: 16px 0 0; color: #12140C; max-width: 16ch;\">Boek een proefrit en voel het verschil.<\u002Fh2>\n      <p style=\"color: #2A3312; font-size: 18px; line-height: 1.5; margin: 22px 0 34px; max-width: 46ch; font-weight: 500;\">Ervaar zelf hoe wendbaar en stabiel de BRISKI rijdt. Kies een moment dat jou uitkomt \u2014 wij zorgen dat de BRISKI klaarstaat. Geen verplichtingen.<\u002Fp>\n      <div style=\"display: flex; flex-wrap: wrap; gap: 14px;\">\n        <a href=\"#contact\" style=\"background: #12140C; color: #F5F3EC; text-decoration: none; font-size: 16px; font-weight: 700; padding: 17px 34px; border-radius: 100px;\">Plan mijn proefrit<\u002Fa>\n        <a href=\"tel:+31000000000\" style=\"border: 1.5px solid rgba(18,20,12,0.4); color: #12140C; text-decoration: none; font-size: 16px; font-weight: 700; padding: 17px 34px; border-radius: 100px;\">Bel ons direct<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PRIJS -->\n  <sc-if value=\"{{ showPricing }}\" hint-placeholder-val=\"{{ true }}\">\n  <section id=\"prijs\" style=\"max-width: 1400px; margin: 0 auto; padding: clamp(72px,10vh,130px) clamp(20px,5vw,64px);\">\n    <div style=\"text-align: center; margin-bottom: 54px;\">\n      <span style=\"font-size: 13px; letter-spacing: 0.14em; color: #5B7A0E; font-weight: 700; text-transform: uppercase;\">&#9135;&#8196; Configuraties<\u002Fspan>\n      <h2 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 700; font-size: clamp(34px,5vw,64px); line-height: 1.0; letter-spacing: -0.03em; margin: 14px auto 0; max-width: 18ch;\">Kies jouw BRISKI<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); gap: 18px; max-width: 900px; margin: 0 auto;\">\n      <div style=\"border: 1px solid rgba(23,25,15,0.08); border-radius: 28px; padding: 40px; background: rgba(251,250,244,0.8); backdrop-filter: blur(8px);\">\n        <h3 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 600; font-size: 24px; margin: 0;\">Standaard<\u002Fh3>\n        <p style=\"color: #6B6D5F; font-size: 14px; margin: 8px 0 22px;\">De complete BRISKI ervaring.<\u002Fp>\n        <div style=\"font-family: 'Bricolage Grotesque',sans-serif; font-size: 44px; font-weight: 700; letter-spacing: -0.03em;\">op aanvraag<\u002Fdiv>\n        <ul style=\"list-style: none; padding: 22px 0 0; margin: 0; display: flex; flex-direction: column; gap: 12px;\">\n          <li style=\"color: #45473B; font-size: 15px; display: flex; gap: 10px;\"><span style=\"color:#5B7A0E;\">\u2713<\u002Fspan> Basisgewicht 47 kg<\u002Fli>\n          <li style=\"color: #45473B; font-size: 15px; display: flex; gap: 10px;\"><span style=\"color:#5B7A0E;\">\u2713<\u002Fspan> Volledig elektrisch<\u002Fli>\n          <li style=\"color: #45473B; font-size: 15px; display: flex; gap: 10px;\"><span style=\"color:#5B7A0E;\">\u2713<\u002Fspan> Standaard accu<\u002Fli>\n        <\u002Ful>\n        <a href=\"#contact\" style=\"display: block; text-align: center; margin-top: 28px; border: 1px solid rgba(23,25,15,0.25); color: #17190F; text-decoration: none; font-weight: 700; padding: 14px; border-radius: 100px;\">Vraag prijs aan<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"border: 2px solid rgba(168,212,38,0.4); border-radius: 28px; padding: 40px; background: linear-gradient(135deg, #17190F, #1C1E12); position: relative; overflow: hidden; box-shadow: 0 24px 56px rgba(23,25,15,0.2);\">\n        <span style=\"position: absolute; top: -1px; right: 32px; background: linear-gradient(135deg, #A8D426, #8FBF1A); color: #12140C; font-size: 11px; font-weight: 700; padding: 8px 18px; border-radius: 0 0 12px 12px; letter-spacing: 0.06em;\">MEEST GEKOZEN<\u002Fspan>\n        <h3 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 600; font-size: 24px; margin: 0; color: #A8D426;\">Li-ion<\u002Fh3>\n        <p style=\"color: #C7C9BB; font-size: 14px; margin: 8px 0 22px;\">Lichter, verder, moeitelozer.<\u002Fp>\n        <div style=\"font-family: 'Bricolage Grotesque',sans-serif; font-size: 44px; font-weight: 700; letter-spacing: -0.03em; color: #F5F3EC;\">op aanvraag<\u002Fdiv>\n        <ul style=\"list-style: none; padding: 22px 0 0; margin: 0; display: flex; flex-direction: column; gap: 12px;\">\n          <li style=\"color: #E7E8DD; font-size: 15px; display: flex; gap: 10px;\"><span style=\"color:#A8D426;\">\u2713<\u002Fspan> Slechts 33 kg totaal<\u002Fli>\n          <li style=\"color: #E7E8DD; font-size: 15px; display: flex; gap: 10px;\"><span style=\"color:#A8D426;\">\u2713<\u002Fspan> Li-ion accu (meerprijs)<\u002Fli>\n          <li style=\"color: #E7E8DD; font-size: 15px; display: flex; gap: 10px;\"><span style=\"color:#A8D426;\">\u2713<\u002Fspan> Grotere actieradius<\u002Fli>\n        <\u002Ful>\n        <a href=\"#contact\" style=\"display: block; text-align: center; margin-top: 28px; background: #A8D426; color: #12140C; text-decoration: none; font-weight: 700; padding: 14px; border-radius: 100px;\">Vraag prijs aan<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- REVIEWS -->\n  <sc-if value=\"{{ showReviews }}\" hint-placeholder-val=\"{{ true }}\">\n  <section style=\"background: #ECEAE0; border-top: 1px solid rgba(23,25,15,0.06); border-bottom: 1px solid rgba(23,25,15,0.06);\">\n    <div style=\"max-width: 1400px; margin: 0 auto; padding: clamp(72px,10vh,120px) clamp(20px,5vw,64px);\">\n      <blockquote style=\"margin: 0; font-family: 'Bricolage Grotesque',sans-serif; font-weight: 500; font-size: clamp(26px,3.6vw,48px); line-height: 1.2; letter-spacing: -0.02em; color: #17190F; max-width: 22ch;\">\"E\u00e9n ritje en ik was om. Zo wendbaar, zo stabiel \u2014 en eenvoudig mee te nemen op reis.\"<\u002Fblockquote>\n      <div style=\"display: flex; align-items: center; gap: 14px; margin-top: 32px;\">\n        <div style=\"width: 48px; height: 48px; border-radius: 50%; background: repeating-linear-gradient(120deg,#DAD8CC,#DAD8CC 8px,#CFCDBF 8px,#CFCDBF 16px);\"><\u002Fdiv>\n        <div><div style=\"font-weight: 700; color: #2A2C20;\">Tester uit Utrecht<\u002Fdiv><div style=\"color: #6B6D5F; font-size: 14px;\">Na een proefrit<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- FAQ -->\n  <section style=\"max-width: 900px; margin: 0 auto; padding: clamp(72px,10vh,130px) clamp(20px,5vw,64px);\">\n    <div style=\"text-align: center; margin-bottom: 48px;\">\n      <span style=\"font-size: 13px; letter-spacing: 0.14em; color: #5B7A0E; font-weight: 700; text-transform: uppercase;\">&#9135;&#8196; Veelgestelde vragen<\u002Fspan>\n      <h2 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 700; font-size: clamp(34px,5vw,60px); line-height: 1.0; letter-spacing: -0.03em; margin: 14px 0 0;\">Goed om te weten<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n      <sc-for list=\"{{ faqs }}\" as=\"item\" hint-placeholder-count=\"4\">\n        <div style=\"border: 1px solid rgba(23,25,15,0.08); border-radius: 20px; background: rgba(251,250,244,0.7); backdrop-filter: blur(8px); overflow: hidden; transition: border-color 0.2s ease;\">\n          <button onclick=\"{{ item.toggle }}\" style=\"width: 100%; text-align: left; background: none; border: none; color: #17190F; font-family: 'Manrope',sans-serif; font-weight: 600; font-size: clamp(16px,2vw,19px); padding: 22px 24px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 16px;\">\n            <span>{{ item.q }}<\u002Fspan>\n            <span style=\"color: #5B7A0E; font-size: 24px; line-height: 1; flex-shrink: 0;\">{{ item.sign }}<\u002Fspan>\n          <\u002Fbutton>\n          <sc-if value=\"{{ item.open }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding: 0 24px 24px; color: #6B6D5F; font-size: 16px; line-height: 1.6;\">{{ item.a }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- VOOR WIE -->\n  <section style=\"background: #FBFAF4; border-top: 1px solid rgba(23,25,15,0.06);\">\n    <div style=\"max-width: 1400px; margin: 0 auto; padding: clamp(72px,10vh,130px) clamp(20px,5vw,64px);\">\n      <div style=\"text-align: center; margin-bottom: 56px;\">\n        <span style=\"font-size: 13px; letter-spacing: 0.14em; color: #5B7A0E; font-weight: 700; text-transform: uppercase;\">&#9135;&#8196; Voor wie is de BRISKI<\u002Fspan>\n        <h2 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 700; font-size: clamp(34px,5vw,64px); line-height: 1.0; letter-spacing: -0.03em; margin: 14px auto 0; max-width: 22ch;\">De perfecte stap tussen fiets en scootmobiel.<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"margin-bottom: 48px; border-radius: 28px; overflow: hidden; box-shadow: 0 16px 48px rgba(23,25,15,0.08);\">\n        <img src=\"https://d8j0ntlcm91z4.cloudfront.net/user_3F2q2CvHTV5b7m7TgMzyzghqiWp/hf_20260704_071706_c0297fcb-d90a-4642-8e59-bffc9cc6a888.png\" alt=\"Vrouw rijdt op een BRISKI door een Nederlandse winkelstraat\" style=\"width: 100%; height: auto; display: block; max-height: 480px; object-fit: cover; object-position: center 30%;\">\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); gap: 20px;\">\n        <div style=\"border: 1px solid rgba(23,25,15,0.08); border-radius: 24px; padding: 36px; background: #FFFFFF;\">\n          <div style=\"width: 46px; height: 46px; border-radius: 12px; background: rgba(168,212,38,0.2); display: flex; align-items: center; justify-content: center; margin-bottom: 22px; font-size: 22px;\">&#128694;<\u002Fdiv>\n          <h3 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 600; font-size: 21px; margin: 0 0 10px; letter-spacing: -0.02em;\">Nog niet aan een scootmobiel toe<\u002Fh3>\n          <p style=\"color: #6B6D5F; font-size: 15px; line-height: 1.6; margin: 0;\">Je wilt wel comfortabel de stad in, maar een scootmobiel voelt als een stap te ver. De BRISKI is modern, licht en wendbaar \u2014 zonder het gevoel van een hulpmiddel.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border: 1px solid rgba(23,25,15,0.08); border-radius: 24px; padding: 36px; background: #FFFFFF;\">\n          <div style=\"width: 46px; height: 46px; border-radius: 12px; background: rgba(168,212,38,0.2); display: flex; align-items: center; justify-content: center; margin-bottom: 22px; font-size: 22px;\">&#127961;<\u002Fdiv>\n          <h3 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 600; font-size: 21px; margin: 0 0 10px; letter-spacing: -0.02em;\">Modern stadsvervoer<\u002Fh3>\n          <p style=\"color: #6B6D5F; font-size: 15px; line-height: 1.6; margin: 0;\">Wendbaar, elektrisch en milieubewust. Ideaal voor dagelijkse boodschappen, een bezoek aan de stad of een avondje uit \u2014 compact en zonder parkeerstress.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border: 1px solid rgba(23,25,15,0.08); border-radius: 24px; padding: 36px; background: #FFFFFF;\">\n          <div style=\"width: 46px; height: 46px; border-radius: 12px; background: rgba(168,212,38,0.2); display: flex; align-items: center; justify-content: center; margin-bottom: 22px; font-size: 22px;\">&#128663;<\u002Fdiv>\n          <h3 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 600; font-size: 21px; margin: 0 0 10px; letter-spacing: -0.02em;\">Meenemen op reis<\u002Fh3>\n          <p style=\"color: #6B6D5F; font-size: 15px; line-height: 1.6; margin: 0;\">Eenvoudig te vervoeren in de auto of camper. Ideaal om op vakantie de omgeving te verkennen \u2014 wendbaar, stabiel en slechts 33 kg met Li-ion accu.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align: center; margin-top: 44px;\">\n        <a href=\"#proefrit\" style=\"background: #17190F; color: #F5F3EC; text-decoration: none; font-size: 16px; font-weight: 700; padding: 18px 36px; border-radius: 100px; display: inline-block;\">Boek een proefrit en ervaar het zelf &#8594;<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- DEALERS GEZOCHT -->\n  <section id=\"dealers\" style=\"max-width: 1400px; margin: 0 auto; padding: clamp(24px,5vw,48px) clamp(20px,5vw,64px) clamp(72px,10vh,120px);\">\n    <div style=\"border: 1px solid rgba(23,25,15,0.08); border-radius: 36px; background: linear-gradient(135deg, #17190F, #1E2014); box-shadow: 0 24px 56px rgba(23,25,15,0.15); padding: clamp(40px,6vw,80px) clamp(28px,5vw,72px); position: relative; overflow: hidden;\">\n      <div style=\"position: absolute; right: -4%; top: -20%; width: 35%; height: 140%; background: repeating-linear-gradient(120deg, rgba(168,212,38,0.04), rgba(168,212,38,0.04) 14px, transparent 14px, transparent 28px); border-radius: 40px;\"><\u002Fdiv>\n      <div style=\"position: relative; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); gap: clamp(28px,4vw,56px); align-items: start;\">\n        <div>\n          <span style=\"font-size: 13px; letter-spacing: 0.14em; color: #A8D426; font-weight: 700; text-transform: uppercase;\">&#9135;&#8196; Word BRISKI-dealer<\u002Fspan>\n          <h2 style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 700; font-size: clamp(34px,4.6vw,60px); line-height: 1.0; letter-spacing: -0.03em; margin: 14px 0 18px; color: #F5F3EC;\">Dealers gezocht<\u002Fh2>\n          <p style=\"color: #C7C9BB; font-size: 18px; line-height: 1.6; margin: 0 0 8px; max-width: 44ch;\">De BRISKI is een uniek en onderscheidend product in de mobiliteitsmarkt. Wij zoeken dealers en scootmobielbedrijven die dit willen aanbieden aan hun klanten.<\u002Fp>\n          <p style=\"color: #9A9C8C; font-size: 15px; line-height: 1.6; margin: 12px 0 0; max-width: 44ch;\">De groeiende vraag naar lichte, elektrische vervoermiddelen maakt de BRISKI een waardevolle aanvulling op uw assortiment.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"display: flex; flex-direction: column; gap: 20px;\">\n            <div style=\"display: flex; align-items: flex-start; gap: 14px;\"><span style=\"color: #A8D426; font-size: 20px; line-height: 1.2; flex-shrink: 0;\">&#10003;<\u002Fspan><div><span style=\"color: #F5F3EC; font-size: 16px; font-weight: 600; line-height: 1.5;\">Aantrekkelijke dealermarges<\u002Fspan><br><span style=\"color: #9A9C8C; font-size: 14px; line-height: 1.5;\">Op een onderscheidend product met weinig concurrentie<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div style=\"display: flex; align-items: flex-start; gap: 14px;\"><span style=\"color: #A8D426; font-size: 20px; line-height: 1.2; flex-shrink: 0;\">&#10003;<\u002Fspan><div><span style=\"color: #F5F3EC; font-size: 16px; font-weight: 600; line-height: 1.5;\">Volledige ondersteuning<\u002Fspan><br><span style=\"color: #9A9C8C; font-size: 14px; line-height: 1.5;\">Marketing, demo-ondersteuning en service vanuit de importeur<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div style=\"display: flex; align-items: flex-start; gap: 14px;\"><span style=\"color: #A8D426; font-size: 20px; line-height: 1.2; flex-shrink: 0;\">&#10003;<\u002Fspan><div><span style=\"color: #F5F3EC; font-size: 16px; font-weight: 600; line-height: 1.5;\">Groeiende doelgroep<\u002Fspan><br><span style=\"color: #9A9C8C; font-size: 14px; line-height: 1.5;\">50+ markt, stadsbewoners en reizigers die licht elektrisch vervoer zoeken<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div style=\"display: flex; align-items: flex-start; gap: 14px;\"><span style=\"color: #A8D426; font-size: 20px; line-height: 1.2; flex-shrink: 0;\">&#10003;<\u002Fspan><div><span style=\"color: #F5F3EC; font-size: 16px; font-weight: 600; line-height: 1.5;\">Direct contact met de importeur<\u002Fspan><br><span style=\"color: #9A9C8C; font-size: 14px; line-height: 1.5;\">Korte lijnen, snelle levering en persoonlijke begeleiding<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; flex-wrap: wrap; gap: 14px; margin-top: 32px;\">\n            <a href=\"mailto:info@briski.nl?subject=Dealer%20aanvraag\" style=\"background: #A8D426; color: #12140C; text-decoration: none; font-size: 16px; font-weight: 700; padding: 16px 32px; border-radius: 100px;\">Dealer worden &#8594;<\u002Fa>\n            <a href=\"mailto:info@briski.nl?subject=Informatie%20voor%20dealers\" style=\"border: 1.5px solid rgba(168,212,38,0.3); color: #A8D426; text-decoration: none; font-size: 16px; font-weight: 600; padding: 15px 30px; border-radius: 100px;\">Meer informatie<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CONTACT / FOOTER -->\n  <footer id=\"contact\" style=\"background: linear-gradient(180deg, #17190F, #111308);\">\n    <div style=\"max-width: 1400px; margin: 0 auto; padding: clamp(56px,8vh,100px) clamp(20px,5vw,64px);\">\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px,1fr)); gap: 40px; align-items: start;\">\n        <div>\n          <div style=\"font-family: 'Bricolage Grotesque',sans-serif; font-weight: 800; font-size: clamp(48px,7vw,80px); letter-spacing: -0.05em; line-height: 1; background: linear-gradient(180deg, #F5F3EC, rgba(245,243,236,0.6)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;\">BRISKI<\u002Fdiv>\n          <p style=\"color: #9A9C8C; font-size: 16px; line-height: 1.6; margin: 20px 0 0; max-width: 34ch;\">Een nieuwe beleving in beweging. De moderne elektrische driewiel step \u2014 wendbaar, stabiel en milieubewust.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size: 13px; letter-spacing: 0.08em; color: #7A7C6C; text-transform: uppercase; margin-bottom: 18px;\">Menu<\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n            <a href=\"#model\" style=\"color: #C7C9BB; text-decoration: none; font-size: 16px;\">Model<\u002Fa>\n            <a href=\"#voordelen\" style=\"color: #C7C9BB; text-decoration: none; font-size: 16px;\">Voordelen<\u002Fa>\n            <a href=\"#specs\" style=\"color: #C7C9BB; text-decoration: none; font-size: 16px;\">Specificaties<\u002Fa>\n            <a href=\"#prijs\" style=\"color: #C7C9BB; text-decoration: none; font-size: 16px;\">Prijs<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size: 13px; letter-spacing: 0.08em; color: #7A7C6C; text-transform: uppercase; margin-bottom: 18px;\">Contact<\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; gap: 12px;\">\n            <a href=\"mailto:info@briski.nl\" style=\"color: #C7C9BB; text-decoration: none; font-size: 16px;\">info@briski.nl<\u002Fa>\n            <a href=\"https://www.briski.nl\" style=\"color: #C7C9BB; text-decoration: none; font-size: 16px;\">www.briski.nl<\u002Fa>\n            <a href=\"#proefrit\" style=\"color: #A8D426; text-decoration: none; font-size: 16px; font-weight: 700;\">Proefrit boeken \u2192<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top: 60px; padding-top: 24px; border-top: 1px solid rgba(245,243,236,0.12); display: flex; flex-wrap: wrap; gap: 12px; justify-content: space-between; color: #7A7C6C; font-size: 14px;\">\n        <span>\u00a9 {{ year }} BRISKI. Alle rechten voorbehouden.<\u002Fspan>\n        <span>Ontworpen in Nederland.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: &quot;100%&quot;, &quot;height&quot;: 900}, &quot;showPricing&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Secties&quot;}, &quot;showReviews&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Secties&quot;}}\">\nclass Component extends DCLogic {\n  state = { mobileOpen: false, openFaq: 0, color: 0 };\n\n  renderVals() {\n    const palette = [\n      { name: \"Rood\", img: \"assets/briski.png\", swatch: \"#C62828\" },\n      { name: \"Oranje\", img: \"assets/briski-oranje.jpeg\", swatch: \"#E38A1B\" },\n      { name: \"Groen\", img: \"assets/briski-groen.jpeg\", swatch: \"#4E7A32\" },\n    ];\n    const colors = palette.map((c, i) => ({\n      name: c.name,\n      swatch: c.swatch,\n      ring: this.state.color === i ? c.swatch : \"transparent\",\n      select: () => this.setState({ color: i }),\n    }));\n    const active = palette[this.state.color] || palette[0];\n\n    const faqData = [\n      { q: \"Heb ik een rijbewijs nodig voor de BRISKI?\", a: \"Dit hangt af van de uitvoering en de lokale regelgeving. Tijdens een proefrit informeren we je graag over wat voor jouw situatie geldt.\" },\n      { q: \"Wat is het verschil tussen de standaard en de Li-ion accu?\", a: \"De standaarduitvoering weegt 47 kg. Met de optionele Li-ion accu (tegen meerprijs) daalt het totaalgewicht naar 33 kg, wat rijden en verplaatsen nog lichter maakt.\" },\n      { q: \"Waar kan ik de BRISKI parkeren?\", a: \"Dankzij het compacte formaat vind je vrijwel overal een plek. De BRISKI is bovendien eenvoudig te vervoeren, ideaal om mee te nemen op reis.\" },\n      { q: \"Hoe snel gaat de BRISKI?\", a: \"De maximale snelheid is 25 km/u. Deze is geheel instelbaar via de draaibare begrenzer aan het stuur. Het actieradius is circa 50 km.\" },\n      { q: \"Kan de BRISKI worden aangepast?\", a: \"Ja, de BRISKI kan worden uitgevoerd met een zadel en rugleuning voor iedereen die iets meer steun wil.\" },\n      { q: \"Kan ik eerst een proefrit maken?\", a: \"Zeker. Proberen is hebben. Boek een proefrit via de knop bovenaan of neem contact met ons op, dan zetten we de BRISKI voor je klaar.\" },\n    ];\n    const faqs = faqData.map((f, i) => ({\n      q: f.q,\n      a: f.a,\n      open: this.state.openFaq === i,\n      sign: this.state.openFaq === i ? \"\u2013\" : \"+\",\n      toggle: () => this.setState(s => ({ openFaq: s.openFaq === i ? -1 : i })),\n    }));\n\n    return {\n      mobileOpen: this.state.mobileOpen,\n      toggleMobile: () => this.setState(s => ({ mobileOpen: !s.mobileOpen })),\n      colors,\n      showRed: this.state.color === 0,\n      showOranje: this.state.color === 1,\n      showGroen: this.state.color === 2,\n      activeColorName: active.name,\n      faqs,\n      showPricing: this.props.showPricing ?? true,\n      showReviews: this.props.showReviews ?? true,\n      year: new Date().getFullYear(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
